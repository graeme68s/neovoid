name: Build Linux

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Prevents queue pile-ups if you push rapid commits
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Speeds up subsequent runs by caching node_modules

      - name: Setup Python (Required for node-gyp native compilation)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Heavy Linux System Build Dependencies
        run: |
          sudo apt-get update -y
          # Install core compiler toolchain + development headers for VS Code's runtime dependencies
          sudo apt-get install -y \
            build-essential \
            g++ \
            pkg-config \
            libkrb5-dev \
            libx11-dev \
            libxkbfile-dev \
            libsecret-1-dev \
            libgl1-mesa-dev \
            libgbm-dev \
            libasound2-dev \
            libgtk-3-dev

      - name: Install Dependencies
        run: |
          # Use npm ci if you have a package-lock.json, otherwise stick to install
          npm install --legacy-peer-deps --ignore-scripts

      - name: Rebuild Native Modules
        run: npm rebuild

      - name: Build React Frontend
        run: npm run buildreact

      - name: Compile TypeScript Core
        run: npm run compile

      - name: Gulp Production Linux Package
        run: npm run gulp vscode-linux-x64

      - name: Tarball Production Build
        run: |
          tar -czf neovoid-linux-x64.tar.gz -C .. VSCode-linux-x64/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: neovoid-linux-x64
          path: neovoid-linux-x64.tar.gz
          compression-level: 6 # Balanced compression speed/size
