name: Build Linux

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libkrb5-dev libx11-dev libxkbfile-dev libsecret-1-dev
          npm install --legacy-peer-deps --ignore-scripts

      - name: Build React
        run: npm run buildreact

      - name: Compile
        run: npm run compile

      - name: Build
        run: npm run gulp vscode-linux-x64-min

      - name: Package
        run: |
          cd ..
          tar -czf neovoid-linux-x64.tar.gz VSCode-linux-x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neovoid-linux-x64
          path: ../neovoid-linux-x64.tar.gz
