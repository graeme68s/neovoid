name: Build macOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Automatically cancels old builds if you push new commits to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted # Intel x86_64 runner matching the x64 build target

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure Native macOS Python Path
        run: |
          # Explicitly point npm/node-gyp to the local system Python 3 binary
          npm config set python /usr/bin/python3

      - name: Install System Dependencies
        run: |
          brew update
          # Critical for building native tools like keytar or canvas-based modules if present
          brew install pkg-config pixman cairo

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps --ignore-scripts

      - name: Rebuild Native Modules
        run: |
          npm rebuild

      - name: Build React Frontend
        run: |
          npm run buildreact

      - name: Compile TypeScript Core
        run: |
          npm run compile

      - name: Gulp Production macOS Package
        run: |
          npm run gulp vscode-darwin-x64

      - name: Tarball Production Build
        run: |
          tar -czf neovoid-mac-x64.tar.gz -C .. VSCode-darwin-x64/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: neovoid-mac-x64
          path: neovoid-mac-x64.tar.gz
          compression-level: 6
