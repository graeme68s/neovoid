name: Build macOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Native macOS Python Path
        run: |
          echo "Forcing build tools to use native Python..."

      - name: Install System Dependencies
        run: |
          eval "$(/opt/homebrew/bin/brew shellenv)"
          brew update
          brew install pkg-config pixman cairo

      - name: Install Node Dependencies
        run: |
          rm -rf node_modules

          # 1. Strip the real spdlog from package.json
          sed -i.bak '/"@vscode\/spdlog"/d' package.json

          # 2. Run the clean install for everything else
          npm install --no-audit --no-fund

          # 3. Create a fake mock directory for spdlog
          mkdir -p node_modules/@vscode/spdlog

          # 4. Write an expanded package.json and index.js for the mock module
          echo '{"name": "@vscode/spdlog", "version": "1.0.0", "main": "index.js"}' > node_modules/@vscode/spdlog/package.json

          cat << 'EOF' > node_modules/@vscode/spdlog/index.js
          class DummyLogger {
            setLevel() {}
            clearFormatters() {}
            flush() {}
            drop() {}
          }
          module.exports = {
            version: '1.0.0',
            setFlushOn: function() {},
            createRotatingLogger: function() { return new DummyLogger(); },
            createAsyncRotatingLogger: function() { return new DummyLogger(); },
            SpdLog: DummyLogger,
            RotatingLogger: DummyLogger,
            Logger: DummyLogger
          };
          EOF

          # 5. Provide matching detailed type definitions for the TS compiler
          cat << 'EOF' > node_modules/@vscode/spdlog/index.d.ts
          export const version: string;
          export function setFlushOn(level: number): void;
          export function createRotatingLogger(name: string, filename: string, maxFileSize: number, maxFiles: number): Logger;
          export function createAsyncRotatingLogger(name: string, filename: string, maxFileSize: number, maxFiles: number): Logger;

          export class Logger {
            setLevel(level: number): void;
            clearFormatters(): void;
            flush(): void;
            drop(): void;
          }
          export class SpdLog extends Logger {}
          export class RotatingLogger extends Logger {}
          EOF

      - name: Rebuild Native Modules
        run: |
          # If you need to rebuild everything EXCEPT spdlog, we can bypass it like this:
          npm rebuild --ignore-scripts=@vscode/spdlog

      - name: Build React Frontend
        run: |
          npm run buildreact

      - name: Run Compile
        run: npm run compile

      - name: Gulp Production macOS Package
        run: |
          npm run gulp vscode-darwin-x64

      - name: Tarball Production Build
        run: |
          tar -czf neovoid-mac-x64.tar.gz -C .. VSCode-darwin-x64/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: neovoid-mac-x64
          path: neovoid-mac-x64.tar.gz
          compression-level: 6
