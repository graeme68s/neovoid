name: Build macOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React
        run: npm run buildreact

      - name: Compile
        run: npm run compile

      - name: Build
        run: npm run gulp vscode-darwin-x64-min

      - name: Package
        run: |
          cd ..
          tar -czf neovoid-macos-x64.tar.gz VSCode-darwin-x64/
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neovoid-macos-x64
          path: ../neovoid-macos-x64.tar.gz
