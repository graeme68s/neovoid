name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React
        run: npm run buildreact

      - name: Compile
        run: npm run compile

      - name: Build
        run: npm run gulp vscode-win32-x64-min

      - name: Package
        run: |
          Compress-Archive -Path ..\VSCode-win32-x64 -DestinationPath neovoid-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neovoid-windows-x64
          path: neovoid-windows-x64.zip
